<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Mobiliza - Login</title>

    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/mobiliza-favicon.svg') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body p-4">

                    <div class="text-center mb-4">

                        <img src="{{ url_for('static', filename='img/mobiliza-logo.svg') }}" alt="Mobiliza" height="70">

                    </div>

                    {% if erro %}

                        <div class="alert alert-danger">
                            {{ erro }}
                        </div>

                    {% endif %}

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">Usuário</label>

                            <input
                                type="text"
                                class="form-control"
                                name="username"
                                required
                                autofocus>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Senha</label>

                            <input
                                type="password"
                                class="form-control"
                                name="senha"
                                required>

                        </div>

                        <button class="btn btn-primary w-100">
                            Entrar
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
