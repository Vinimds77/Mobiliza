<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Histórico de Cliques</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2>📈 Histórico de Cliques</h2>

    <hr>

    <table class="table table-striped">

        <thead>

            <tr>

                <th>ID</th>

                <th>Campanha</th>

                <th>IP</th>

                <th>Data</th>

            </tr>

        </thead>

        <tbody>

        {% for clique in cliques %}

        <tr>

            <td>{{ clique.id }}</td>

            <td>{{ clique.campanha_id }}</td>

            <td>{{ clique.ip }}</td>

            <td>{{ clique.data }}</td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>

</html>
