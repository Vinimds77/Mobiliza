{% extends "base.html" %}

{% block titulo %}Campanhas{% endblock %}

{% block conteudo %}

    <h1>📢 Campanhas</h1>

    <hr>

    <div class="card mb-5">

        <div class="card-header">
            Nova Campanha
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Nome da campanha
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="titulo"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Segmento
                    </label>

                    <select
                        class="form-select"
                        name="segmento"
                        required>

                        <option value="">Selecione um segmento</option>

                        {% for segmento in segmentos %}

                        <option value="{{ segmento.id }}">
                            {{ segmento.nome }}
                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        URL de destino
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="destino"
                        placeholder="https://instagram.com/..."
                        required>

                </div>

                <button class="btn btn-primary">
                    Gerar Link
                </button>

            </form>

        </div>

    </div>

    <h2>Campanhas Criadas</h2>

    <table class="table table-striped table-bordered align-middle">

        <thead class="table-dark">

            <tr>

                <th>ID</th>

                <th>Campanha</th>

                <th>Contatos</th>

                <th>Link Geral</th>

                <th>Ações</th>

            </tr>

        </thead>

        <tbody>

            {% for campanha in campanhas %}

            <tr>

                <td>{{ campanha.id }}</td>

                <td>{{ campanha.titulo }}</td>

                <td>
                    -
                </td>

                <td>

                    <input
                        type="text"
                        class="form-control"
                        value="{{ request.host_url }}r/{{ campanha.codigo }}"
                        readonly>

                </td>

                <td>

                    <a
                        href="/campanha/{{ campanha.id }}"
                        class="btn btn-primary btn-sm">

                        Ver

                    </a>

                    <a
                        href="/campanhas/excluir/{{ campanha.id }}"
                        class="btn btn-danger btn-sm"
                        onclick="return confirm('Tem certeza que deseja excluir a campanha {{ campanha.titulo }}? Todos os cliques e vínculos com contatos serão apagados.');">

                        Excluir

                    </a>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

{% endblock %}
